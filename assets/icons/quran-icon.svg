<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Soft purple background circle gradient -->
    <radialGradient id="bgCircleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </radialGradient>
    <!-- Kaaba deep purple gradient -->
    <linearGradient id="kaabaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="100%" stop-color="#1E0A4A"/>
    </linearGradient>
    <!-- Kaaba left face (slightly lighter for depth) -->
    <linearGradient id="kaabaLeftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B0764"/>
      <stop offset="100%" stop-color="#1E0A4A"/>
    </linearGradient>
    <!-- Golden trim gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="40%" stop-color="#FFAA00"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- Soft shadow for Kaaba -->
    <filter id="kaabaShadow" x="-12%" y="-8%" width="124%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#3B0764" flood-opacity="0.4"/>
    </filter>
    <!-- Star glow -->
    <filter id="starGlowSm" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgCircleGrad)"/>
  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="#C084FC" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="228" fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.2"/>

  <!-- ── KAABA ── -->
  <g filter="url(#kaabaShadow)">

    <!-- Main front face of Kaaba -->
    <rect x="148" y="175" width="216" height="228" rx="4" fill="url(#kaabaGrad)"/>

    <!-- Left perspective face (isometric depth) -->
    <polygon points="148,175 108,140 108,368 148,403" fill="url(#kaabaLeftGrad)"/>

    <!-- Top face (roof) -->
    <polygon points="148,175 108,140 324,140 364,175" fill="#2E1065" opacity="0.85"/>

    <!-- Top roof inner detail -->
    <polygon points="155,172 116,143 318,143 357,172" fill="#3B0764" opacity="0.4"/>

    <!-- ── Golden trim band (Kiswa stripe) ── -->
    <!-- Front band -->
    <rect x="148" y="245" width="216" height="32" fill="url(#goldGrad)"/>

    <!-- Left face band -->
    <polygon points="108,218 148,245 148,277 108,250" fill="#FFAA00" opacity="0.85"/>

    <!-- Trim top edge highlight -->
    <rect x="148" y="243" width="216" height="3" rx="1" fill="#FDE68A" opacity="0.7"/>
    <!-- Trim bottom edge shadow -->
    <rect x="148" y="274" width="216" height="2" rx="1" fill="#92400E" opacity="0.35"/>

    <!-- ── Subtle calligraphy-like decorative lines on band ── -->
    <line x1="172" y1="261" x2="340" y2="261" stroke="#7C2D12" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <line x1="185" y1="255" x2="185" y2="272" stroke="#7C2D12" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <line x1="256" y1="255" x2="256" y2="272" stroke="#7C2D12" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <line x1="327" y1="255" x2="327" y2="272" stroke="#7C2D12" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

    <!-- ── Door (front face) ── -->
    <rect x="215" y="320" width="82" height="83" rx="6" fill="#1E0A4A"/>
    <!-- Door arch top -->
    <ellipse cx="256" cy="326" rx="41" ry="14" fill="#1E0A4A"/>
    <!-- Door golden frame -->
    <rect x="213" y="318" width="86" height="87" rx="7" fill="none" stroke="#FFAA00" stroke-width="3.5" opacity="0.85"/>
    <!-- Door inner panel lines -->
    <rect x="224" y="330" width="64" height="66" rx="4" fill="none" stroke="#FFAA00" stroke-width="1.5" opacity="0.4"/>

    <!-- ── Edge highlights for 3D feel ── -->
    <!-- Front face left edge highlight -->
    <line x1="150" y1="178" x2="150" y2="400" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.08"/>
    <!-- Front face top edge highlight -->
    <line x1="150" y1="178" x2="362" y2="178" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.06"/>

  </g>

  <!-- ── GOLDEN STARS scattered around Kaaba ── -->
  <!-- Star helper: 5-point, small, with glow -->

  <!-- Top-left star -->
  <g filter="url(#starGlowSm)" transform="translate(108, 108)">
    <polygon points="0,-18 4,-7 16,-7 7,0 11,12 0,5 -11,12 -7,0 -16,-7 -4,-7"
             fill="#FFAA00"/>
    <circle cx="0" cy="0" r="4" fill="#FDE68A" opacity="0.8"/>
  </g>

  <!-- Top-right star -->
  <g filter="url(#starGlowSm)" transform="translate(400, 96)">
    <polygon points="0,-22 5,-8 20,-8 8,1 13,15 0,7 -13,15 -8,1 -20,-8 -5,-8"
             fill="#FFAA00"/>
    <circle cx="0" cy="0" r="5" fill="#FDE68A" opacity="0.8"/>
  </g>

  <!-- Right mid star -->
  <g filter="url(#starGlowSm)" transform="translate(418, 268)">
    <polygon points="0,-14 3,-5 13,-5 6,0 9,10 0,4 -9,10 -6,0 -13,-5 -3,-5"
             fill="#FFAA00"/>
    <circle cx="0" cy="0" r="3" fill="#FDE68A" opacity="0.8"/>
  </g>

  <!-- Bottom-right star -->
  <g filter="url(#starGlowSm)" transform="translate(388, 390)">
    <polygon points="0,-16 4,-6 15,-6 6,0 10,11 0,5 -10,11 -6,0 -15,-6 -4,-6"
             fill="#FFAA00"/>
    <circle cx="0" cy="0" r="3.5" fill="#FDE68A" opacity="0.8"/>
  </g>

  <!-- Bottom-left star -->
  <g filter="url(#starGlowSm)" transform="translate(118, 390)">
    <polygon points="0,-14 3,-5 13,-5 6,0 9,10 0,4 -9,10 -6,0 -13,-5 -3,-5"
             fill="#FFAA00"/>
    <circle cx="0" cy="0" r="3" fill="#FDE68A" opacity="0.8"/>
  </g>

  <!-- Left mid star -->
  <g filter="url(#starGlowSm)" transform="translate(88, 250)">
    <polygon points="0,-12 3,-4 11,-4 5,0 7,9 0,4 -7,9 -5,0 -11,-4 -3,-4"
             fill="#FFAA00"/>
    <circle cx="0" cy="0" r="2.5" fill="#FDE68A" opacity="0.8"/>
  </g>

  <!-- Tiny accent star top-center -->
  <g filter="url(#starGlowSm)" transform="translate(256, 82)">
    <polygon points="0,-10 2,-4 9,-4 4,0 6,8 0,3 -6,8 -4,0 -9,-4 -2,-4"
             fill="#C084FC"/>
    <circle cx="0" cy="0" r="2" fill="#EDE9FE" opacity="0.9"/>
  </g>

  <!-- Tiny dots for extra sparkle -->
  <circle cx="340" cy="110" r="4" fill="#FFAA00" opacity="0.55"/>
  <circle cx="170" cy="128" r="3" fill="#FFAA00" opacity="0.45"/>
  <circle cx="430" cy="170" r="3" fill="#FDE68A" opacity="0.4"/>
  <circle cx="82" cy="310" r="3" fill="#FDE68A" opacity="0.4"/>
  <circle cx="430" cy="340" r="2.5" fill="#FDE68A" opacity="0.35"/>

</svg>
