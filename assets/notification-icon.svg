<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Android notification icon requirements:
    - White icon on transparent background
    - Single flat color only (white)
    - All alpha channels respected by the OS
    - Simple, recognizable silhouette
  -->

  <!-- Bell body: rounded arch shape -->
  <path d="
    M48 10
    C48 10 28 14 24 36
    L20 62
    Q19 68 14 70
    L14 76
    Q14 80 18 80
    L78 80
    Q82 80 82 76
    L82 70
    Q77 68 76 62
    L72 36
    C68 14 48 10 48 10
    Z"
    fill="#FFFFFF"/>

  <!-- Bell clapper (bottom notch) -->
  <path d="M40 80 Q40 90 48 90 Q56 90 56 80 Z"
        fill="#FFFFFF"/>

  <!-- Bell top mount / hanger knob -->
  <circle cx="48" cy="10" r="6" fill="#FFFFFF"/>

  <!-- Small notification dot (top-right, optional accent) -->
  <!-- Kept as filled circle to signal unread state -->
  <circle cx="72" cy="22" r="10" fill="#FFFFFF"/>

</svg>
